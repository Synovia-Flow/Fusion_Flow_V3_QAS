# Render blueprint — Synovia Flow 3 live portal (Docker web service, Frankfurt).
# Deploy: Render Dashboard → New → Blueprint → point at this repo. Render reads
# this file and provisions the live portal + /api/blueprint straight from the DB
# (the Docker image bundles the Microsoft ODBC driver for pyodbc). Requires the
# Azure SQL firewall to allow this service's outbound IPs. DB_PASSWORD is a
# secret; sync:false values are prompted on deploy (or upload liveWeb/.env).
services:
  - type: web
    name: synovia-flow-3-live
    runtime: docker
    region: frankfurt
    rootDir: liveWeb
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        value: Fusion_Flow_V3_QAS
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DRIVER
        value: "{ODBC Driver 18 for SQL Server}"
      - key: DB_ENCRYPT
        value: "yes"
      - key: DB_TRUST
        value: "no"
