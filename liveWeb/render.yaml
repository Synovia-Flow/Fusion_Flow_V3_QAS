# Render blueprint — Synovia Flow 3 live portal (static site, Frankfurt).
# Deploy: Render Dashboard → New → Blueprint → point at this repo. Render reads
# this file, serves the liveWeb/ folder as a static site in the Frankfurt region.
services:
  - type: web
    name: synovia-flow-3-portal
    runtime: static
    region: frankfurt
    rootDir: liveWeb
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    buildCommand: ""
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

