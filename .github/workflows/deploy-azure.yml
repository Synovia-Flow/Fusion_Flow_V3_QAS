name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    name: API (FastAPI to App Service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Integration_Layer/Portal/fusion_api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile app/main.py

      # App Service settings required at runtime:
      # DB_CONN_STR, FLOW_V1_USER, FLOW_V1_PASSWORD, FUSION_PORTAL_CORS_ORIGINS.
      # Configure the Linux startup command in Azure, for example:
      # python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: Integration_Layer/Portal/fusion_api

  deploy-portal:
    name: Portal (React to Static Web Apps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Integration_Layer/Portal/fusion_portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Integration_Layer/Portal/fusion_portal/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: Integration_Layer/Portal/fusion_portal
          output_location: dist
          skip_app_build: true
