<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Fusion Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --fusion-navy: #0b1d3a;
            --fusion-blue: #1a5ccc;
            --fusion-amber: #f5b301;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0b1d3a 0%, #1a3a6b 50%, #0b1d3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            overflow: hidden;
        }
        .login-hero {
            background: #fff;
            border-bottom: 2px solid #f1f5f9;
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
        }
        .fusion-logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .fusion-logo-img {
            height: 36px;
            border-radius: 4px;
        }
        .fusion-label {
            text-align: left;
            line-height: 1.1;
        }
        .fusion-label .title {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--fusion-navy);
            letter-spacing: -0.3px;
        }
        .fusion-label .sub {
            font-size: 0.62rem;
            color: #9ca3af;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .login-body {
            padding: 2rem;
        }
        .login-body h5 {
            font-weight: 700;
            color: var(--fusion-navy);
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }
        .login-body p {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .form-control {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.88rem;
            border-radius: 6px;
            border: 1.5px solid #e2e8f0;
            padding: 0.6rem 0.85rem;
        }
        .form-control:focus {
            border-color: var(--fusion-blue);
            box-shadow: 0 0 0 3px rgba(26,92,204,0.12);
        }
        .form-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.3rem;
        }
        .btn-sign-in {
            background: var(--fusion-navy);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.88rem;
            padding: 0.65rem;
            width: 100%;
            letter-spacing: 0.2px;
            transition: background 0.15s;
        }
        .btn-sign-in:hover { background: var(--fusion-blue); color: #fff; }
        .btn-sign-in:disabled {
            background: #35517d;
            cursor: wait;
            opacity: 0.95;
        }
        .alert-danger {
            font-size: 0.82rem;
            border-radius: 6px;
            padding: 0.6rem 0.85rem;
        }
        .login-footer {
            background: #f8fafc;
            border-top: 1px solid #f1f5f9;
            text-align: center;
            padding: 0.85rem 1rem;
            font-size: 0.68rem;
            color: #9ca3af;
            letter-spacing: 0.2px;
        }
        .login-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 1050;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(5, 14, 31, 0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .login-loading-overlay.is-visible {
            display: flex;
        }
        .login-loading-card {
            min-width: 220px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 24px 70px rgba(0,0,0,0.42);
            padding: 1.45rem 1.65rem 1.35rem;
            text-align: center;
        }
        .login-loader-orb {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 0.95rem;
            border-radius: 999px;
            background:
                radial-gradient(circle at 35% 30%, #fff8d6 0 22%, transparent 23%),
                linear-gradient(145deg, #fff4bf 0%, #ffd45c 56%, #f5b301 100%);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 12px 24px rgba(245,179,1,.28);
            overflow: hidden;
        }
        .login-loader-orb::before {
            content: "";
            position: absolute;
            inset: 8px;
            border-radius: inherit;
            border: 3px solid rgba(11,29,58,.12);
            border-top-color: rgba(11,29,58,.58);
            animation: login-loader-spin 1.1s linear infinite;
        }
        .login-loader-road {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 26px;
            height: 3px;
            border-radius: 999px;
            background: rgba(11,29,58,.3);
        }
        .login-loader-truck {
            position: absolute;
            left: 22px;
            bottom: 29px;
            width: 52px;
            height: 25px;
            animation: login-loader-truck 1.25s ease-in-out infinite;
        }
        .login-loader-truck-box,
        .login-loader-truck-cab {
            position: absolute;
            bottom: 7px;
            background: #f59e0b;
            border: 2px solid #0b1d3a;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.55);
        }
        .login-loader-truck-box {
            left: 2px;
            width: 29px;
            height: 15px;
            border-radius: 4px 3px 3px 4px;
        }
        .login-loader-truck-cab {
            left: 30px;
            width: 17px;
            height: 12px;
            border-radius: 3px 6px 3px 2px;
        }
        .login-loader-truck-cab::before {
            content: "";
            position: absolute;
            top: 2px;
            right: 3px;
            width: 6px;
            height: 5px;
            border-radius: 1px;
            background: #dbeafe;
        }
        .login-loader-wheel {
            position: absolute;
            bottom: 2px;
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #0b1d3a;
            box-shadow: inset 0 0 0 2px #ffffff;
        }
        .login-loader-wheel-left { left: 9px; }
        .login-loader-wheel-right { left: 35px; }
        .login-loading-title {
            color: var(--fusion-navy);
            font-size: 0.94rem;
            font-weight: 800;
            letter-spacing: 0.2px;
        }
        .login-loading-meta {
            margin-top: 0.25rem;
            color: #64748b;
            font-size: 0.74rem;
            font-weight: 600;
        }
        .login-is-loading .login-card {
            filter: saturate(.92) brightness(.94);
        }
        @keyframes login-loader-spin {
            to { transform: rotate(360deg); }
        }
        @keyframes login-loader-truck {
            0%, 100% { transform: translateX(-4px); }
            50% { transform: translateX(5px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .login-loader-orb::before,
            .login-loader-truck {
                animation: none;
            }
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Hero: Fusion branding -->
    <div class="login-hero">
        <div class="fusion-logo-wrap mt-1">
            <img src="/static/img/fusion_logo.jpg"
                 alt="Fusion"
                 class="fusion-logo-img"
                 onerror="this.style.display='none'">
            <div class="fusion-label">
                <div class="title">Fusion Flow</div>
                <div class="sub">Customs &amp; Supply Chain Integration</div>
            </div>
        </div>
    </div>

    <!-- Login form -->
    <div class="login-body">
        <h5>Sign in</h5>
        <p>Enter your credentials to access the portal.</p>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form id="loginForm" method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') | urlencode }}{% endif %}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="admin" autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" id="loginSubmitButton" class="btn-sign-in">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
    </div>

    <div class="login-footer">
        Fusion Flow V2 &mdash; Synovia Digital Ltd &mdash; 2026
    </div>

</div>

<div id="loginLoadingOverlay" class="login-loading-overlay" role="status" aria-live="polite" aria-hidden="true">
    <div class="login-loading-card">
        <div class="login-loader-orb" aria-hidden="true">
            <span class="login-loader-road"></span>
            <span class="login-loader-truck">
                <span class="login-loader-truck-box"></span>
                <span class="login-loader-truck-cab"></span>
                <span class="login-loader-wheel login-loader-wheel-left"></span>
                <span class="login-loader-wheel login-loader-wheel-right"></span>
            </span>
        </div>
        <div class="login-loading-title">Loading...</div>
        <div class="login-loading-meta">Preparing your dashboard</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const form = document.getElementById('loginForm');
    const overlay = document.getElementById('loginLoadingOverlay');
    const button = document.getElementById('loginSubmitButton');
    const originalButtonHtml = button ? button.innerHTML : '';
    if (!form || !overlay || !button) {
        return;
    }

    function hideLoginLoader() {
        overlay.classList.remove('is-visible');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('login-is-loading');
        button.disabled = false;
        button.removeAttribute('aria-busy');
        if (originalButtonHtml) {
            button.innerHTML = originalButtonHtml;
        }
    }

    form.addEventListener('submit', function (event) {
        if (event.defaultPrevented || (typeof form.checkValidity === 'function' && !form.checkValidity())) {
            return;
        }
        overlay.classList.add('is-visible');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('login-is-loading');
        button.disabled = true;
        button.setAttribute('aria-busy', 'true');
        button.innerHTML = '<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span> Signing in...';
    });

    window.addEventListener('pageshow', hideLoginLoader);
})();
</script>
</body>
</html>
