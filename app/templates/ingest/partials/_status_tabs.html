{% set queue_panel = queue_panel|default(panel|default('queue')) %}
{% set queue_status_filter = queue_status_filter|default(status_filter|default('ALL')) %}

<ul class="nav nav-tabs filter-tabs mb-3">
    {% for s in status_tabs %}
    {% set cnt = status_counts.get(s, 0) %}
    <li class="nav-item">
        <a class="nav-link {{ 'active' if queue_status_filter == s }}"
           href="{{ url_for('ingest.queue', panel=queue_panel, status=s, page=1) }}">
            {{ s }}
            {% if cnt > 0 %}
            <span class="badge {% if s in ['UNMAPPED', 'FAILED'] %}bg-danger{% elif s in ['INTEGRATED', 'STAGED'] %}bg-success{% else %}bg-secondary{% endif %} ms-1">{{ cnt }}</span>
            {% endif %}
        </a>
    </li>
    {% endfor %}
</ul>
