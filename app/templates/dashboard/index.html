{% extends 'base.html' %}
{% block title %}Automation Logs{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h4 class="page-title"><i class="bi bi-envelope-arrow-down"></i> Automation Activity Logs</h4>
        <p class="page-subtitle">Email ingestion, staging pipeline, and TSS submission status.</p>
    </div>
    <div class="page-actions d-flex gap-2">
        <form method="POST" action="{{ url_for('ingest.fetch_mailbox') }}" class="d-inline">
            <input type="hidden" name="provider" value="auto">
            <button type="submit" class="btn btn-sm btn-primary">
                <i class="bi bi-envelope-arrow-down"></i> Fetch Emails
            </button>
        </form>
        <button hx-get="{{ url_for('dashboard.partial') }}"
                hx-target="#dashboard-content"
                hx-indicator="#loading-spinner"
                class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>
</div>

<div class="mb-3">
    <form method="GET" action="{{ url_for('dashboard.search') }}" class="d-flex gap-2">
        <input type="text" name="q" class="form-control search-bar"
               placeholder="Search ENS/ICR, DEC/S-ORD, SFD, SUP/SDI, SKU, goods, files, or email subjects...">
        <button type="submit" class="btn btn-outline-secondary">
            <i class="bi bi-search"></i> Search
        </button>
    </form>
</div>

<div id="dashboard-content"
     hx-get="{{ url_for('dashboard.partial') }}"
     hx-trigger="every 120s"
     hx-target="this"
     hx-swap="innerHTML"
     hx-indicator="#loading-spinner">
    {% include 'partials/_dashboard_content.html' %}
</div>
{% endblock %}
