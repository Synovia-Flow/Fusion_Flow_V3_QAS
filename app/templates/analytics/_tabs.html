{# Analytics tab bar — Performance always, Tenants only for SYD. #}
{% set _active = active_tab|default('performance') %}
<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link {% if _active == 'performance' %}active{% endif %}"
           href="{{ url_for('analytics.index') }}">
            <i class="bi bi-bar-chart-line"></i> Performance
        </a>
    </li>
    {% if (tenant_code or '')|upper == 'SYD' %}
        <li class="nav-item">
            <a class="nav-link {% if _active == 'tenants' %}active{% endif %}"
               href="{{ url_for('tenant_analytics.index') }}">
                <i class="bi bi-buildings"></i> Tenants
                <span class="badge bg-primary-subtle text-primary-emphasis ms-1">SYD only</span>
            </a>
        </li>
    {% endif %}
</ul>
