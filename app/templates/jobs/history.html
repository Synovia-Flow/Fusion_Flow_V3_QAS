{% extends 'base.html' %}
{% block title %}Jobs{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h4 class="fw-bold mb-0" style="color: var(--fusion-navy);">
            <i class="bi bi-gear-wide-connected"></i> API Job History
        </h4>
        <p class="text-muted small mb-0">Auto-refreshes every 2 minutes — run scripts locally to process queue</p>
    </div>
    <div class="d-flex gap-2">
        <button hx-get="{{ url_for('jobs.history_partial') }}"
                hx-target="#jobs-content"
                hx-indicator="#loading-spinner"
                class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
        <a href="{{ url_for('analytics.index') }}" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-bar-chart-line"></i> Full Analytics
        </a>
    </div>
</div>

<div id="jobs-content"
     hx-get="{{ url_for('jobs.history_partial') }}"
     hx-trigger="every 120s"
     hx-target="this"
     hx-swap="innerHTML"
     hx-indicator="#loading-spinner">
    {% include 'jobs/_history_partial.html' %}
</div>
{% endblock %}
