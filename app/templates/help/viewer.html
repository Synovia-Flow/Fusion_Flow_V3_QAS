{% extends 'base.html' %}
{% block title %}{{ doc.title }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-3">
        <a href="{{ url_for('help.index') }}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <div>
            <h5 class="mb-0 fw-bold" style="color: {{ doc.color }};">
                <i class="bi {{ doc.icon }}"></i> {{ doc.title }}
            </h5>
            <span class="text-muted small">{{ doc.desc }}</span>
        </div>
    </div>
    <a href="{{ url_for('help.raw_doc', slug=doc.slug) }}" target="_blank" class="btn btn-sm btn-outline-primary">
        <i class="bi bi-box-arrow-up-right"></i> Open Full Screen
    </a>
</div>

<div class="card border-0 shadow-sm" style="height: calc(100vh - 220px); min-height: 500px;">
    <iframe src="{{ url_for('help.raw_doc', slug=doc.slug) }}"
            style="width: 100%; height: 100%; border: none; border-radius: 0 0 8px 8px;"
            loading="lazy">
    </iframe>
</div>
{% endblock %}
