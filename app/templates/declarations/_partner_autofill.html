<div class="row g-3 mb-4">
    <div class="col-md-4">
        <label class="form-label fw-semibold">Carrier EORI <span class="text-danger">*</span></label>
        <input type="text" name="carrier_eori" class="form-control font-monospace" value="{{ partner.eori or '' }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label fw-semibold">Carrier Name</label>
        <input type="text" name="carrier_name" class="form-control" value="{{ partner.partner_name or '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Street / Number</label>
        <input type="text" name="carrier_street_number" class="form-control" value="{{ partner.address_line1 or '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label">City</label>
        <input type="text" name="carrier_city" class="form-control" value="{{ partner.city or '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label">Postcode</label>
        <input type="text" name="carrier_postcode" class="form-control" value="{{ partner.postcode or '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label">Country</label>
        <input type="text" name="carrier_country" class="form-control" value="{{ partner.country or '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label">Haulier EORI</label>
        <input type="text" name="haulier_eori" class="form-control font-monospace" value="">
    </div>
</div>
