{% extends 'base.html' %}
{% block title %}Ops Flow{% endblock %}

{% block content %}
<style>
.ops-page {
  --brand: var(--fusion-blue);
  --brand-2: var(--fusion-blue-light);
  --good: var(--status-success);
  --good-bg: rgba(22,163,74,.12);
  --good-bdr: rgba(22,163,74,.28);
  --warn: var(--status-warning);
  --warn-bg: rgba(217,119,6,.14);
  --warn-bdr: rgba(217,119,6,.30);
  --bad: var(--status-danger);
  --bad-bg: rgba(220,38,38,.12);
  --bad-bdr: rgba(220,38,38,.26);
  --neutral-bg: rgba(59,130,246,.12);
  --neutral-bdr: rgba(59,130,246,.24);
  --panel: var(--surface-panel);
  --panel-soft: var(--surface-panel-soft);
  --panel-muted: var(--surface-muted);
  --line: var(--surface-border);
  --line-2: var(--surface-border);
  --text: var(--text-strong);
  --muted: var(--text-muted);
  --shadow: var(--surface-shadow);
  max-width: 1560px;
  margin: 0 auto;
}
.ops-hero {
  background: linear-gradient(135deg, rgba(15,61,145,.96) 0%, rgba(31,107,255,.92) 55%, rgba(2,122,72,.90) 100%);
  color: #fff;
  border-radius: 22px;
  box-shadow: var(--shadow);
  padding: 26px 30px 0;
  margin-bottom: 20px;
  overflow: hidden;
}
.ops-hero-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.ops-hero h1 { margin: 0 0 5px; font-size: 22px; font-weight: 800; letter-spacing: -.4px; }
.ops-hero-sub { font-size: 12px; opacity: .88; max-width: 820px; }
.ops-hero-bar { height: 3px; background: linear-gradient(90deg, rgba(255,255,255,.6), rgba(255,255,255,.1)); }
.ops-hero-actions { display: flex; gap: 8px; }
.hero-btn {
  padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: 700; border: none;
  cursor: pointer; text-decoration: none; white-space: nowrap;
}
.hero-btn-primary { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.3); }
.hero-btn-primary:hover { background: rgba(255,255,255,.3); color: #fff; }
.hero-btn-ghost { background: transparent; color: rgba(255,255,255,.78); border: 1px solid rgba(255,255,255,.2); }
.hero-btn-ghost:hover { color: #fff; }
.refresh-badge {
  font-size: 10px; color: rgba(255,255,255,.72); background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15); border-radius: 20px; padding: 4px 12px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1.15fr .85fr;
  gap: 18px;
  margin-bottom: 18px;
}
.info-panel {
  background: linear-gradient(180deg, color-mix(in srgb, var(--panel-soft) 92%, transparent), color-mix(in srgb, var(--panel-muted) 48%, var(--panel-soft)));
  border: 1px solid var(--line-2);
  border-radius: 20px;
  box-shadow: var(--surface-shadow-soft);
  overflow: hidden;
}
.info-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line-2);
}
.info-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--brand);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.info-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

.decl-types {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 14px;
  padding: 18px 20px 20px;
}
.decl-card {
  position: relative;
  background: var(--panel-soft);
  border: 1px solid var(--line-2);
  border-radius: 16px;
  padding: 16px 14px 14px;
  box-shadow: var(--surface-shadow-soft);
}
.decl-card::before {
  content: "";
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 4px;
  border-radius: 16px 16px 0 0;
  background: var(--card-color, var(--brand-2));
}
.decl-kicker {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .9px;
  color: var(--muted);
  margin-bottom: 6px;
}
.decl-name { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 2px; }
.decl-ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--brand);
  font-weight: 700;
  margin-bottom: 8px;
}
.decl-copy { font-size: 11px; line-height: 1.5; color: var(--muted); min-height: 50px; }
.decl-when {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
  font-size: 10px;
  color: var(--muted);
}

.step-list {
  display: grid;
  gap: 12px;
  padding: 18px 20px 20px;
}
.step-row {
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 12px;
  align-items: start;
}
.step-num {
  width: 42px; height: 42px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: var(--brand);
  background: var(--neutral-bg); border: 1px solid var(--neutral-bdr);
}
.step-body {
  background: var(--panel-soft);
  border: 1px solid var(--line-2);
  border-radius: 14px;
  padding: 12px 14px;
}
.step-title { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.step-api {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--brand);
  background: var(--neutral-bg);
  border: 1px solid var(--neutral-bdr);
  padding: 3px 8px;
  border-radius: 999px;
  display: inline-flex;
  margin-bottom: 6px;
}
.step-copy { font-size: 11px; line-height: 1.5; color: var(--muted); }

.route-block {
  background: var(--panel);
  border: 1px solid var(--line-2);
  border-radius: 20px;
  box-shadow: var(--surface-shadow);
  margin-bottom: 18px;
  overflow: hidden;
}
.route-header {
  padding: 18px 24px 12px;
  border-bottom: 1px solid var(--line-2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.route-title { font-size: 14px; font-weight: 800; color: var(--brand); text-transform: uppercase; letter-spacing: .6px; }
.route-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.route-chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.route-chip {
  font-size: 10px; font-weight: 800; letter-spacing: .4px;
  border-radius: 999px; padding: 5px 10px;
  background: var(--panel-muted); color: var(--muted); border: 1px solid var(--line-2);
}

.kpi-row { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 14px; padding: 20px 24px; border-bottom: 1px solid var(--line-2); }
.kpi-tile {
  background: linear-gradient(180deg, var(--panel-soft) 0%, color-mix(in srgb, var(--panel-muted) 50%, var(--panel-soft)) 100%);
  border: 1px solid var(--line-2); border-radius: 20px; padding: 18px 16px 16px;
  box-shadow: var(--surface-shadow);
  position: relative; overflow: hidden; display: flex; flex-direction: column; min-height: 130px;
}
.kpi-tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 20px 20px 0 0; }
.kpi-tile.good::before { background: linear-gradient(90deg, var(--good), #34d399); }
.kpi-tile.warn::before { background: linear-gradient(90deg, var(--warn), #f59e0b); }
.kpi-tile.bad::before { background: linear-gradient(90deg, var(--bad), #f87171); }
.kpi-tile.blue::before { background: linear-gradient(90deg, var(--brand-2), #60a5fa); }
.kpi-tile.purple::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
.kpi-tile.teal::before { background: linear-gradient(90deg, #0891b2, #22d3ee); }
.kpi-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
.kpi-val { font-size: 32px; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -.5px; }
.kpi-tile.good .kpi-val { color: var(--good); }
.kpi-tile.warn .kpi-val { color: var(--warn); }
.kpi-tile.bad .kpi-val { color: var(--bad); }
.kpi-tile.blue .kpi-val { color: var(--brand-2); }
.kpi-tile.purple .kpi-val { color: #7c3aed; }
.kpi-tile.teal .kpi-val { color: #0891b2; }
.kpi-sub { font-size: 10px; color: var(--muted); margin-top: 6px; line-height: 1.5; flex: 1; }
.kpi-prog-wrap { background: var(--line-2); border-radius: 6px; height: 7px; margin-top: 10px; overflow: hidden; }
.kpi-prog-bar { border-radius: 6px; height: 7px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.kpi-spacer { height: 17px; margin-top: 10px; }

.chains-body { padding: 16px 24px 24px; display: grid; gap: 14px; }
.chain-card {
  border: 1px solid var(--line-2);
  border-radius: 22px;
  background: linear-gradient(180deg, color-mix(in srgb, var(--panel-soft) 92%, transparent), color-mix(in srgb, var(--panel-muted) 48%, var(--panel-soft)));
  box-shadow: var(--surface-shadow-soft);
  overflow: hidden;
}
.chain-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px; border-bottom: 1px solid var(--line-2); gap: 16px; flex-wrap: wrap;
}
.chain-ref { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 13px; font-weight: 700; color: var(--brand); }
.chain-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.chain-meta { display: flex; gap: 16px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
.chain-meta span { display: flex; align-items: center; gap: 4px; font-weight: 600; }

.pipeline { display: grid; grid-template-columns: 1fr 32px 1fr 32px 1fr 32px 1fr; min-height: 120px; }
.stage {
  padding: 16px 18px; display: flex; flex-direction: column; gap: 5px;
  border-right: 1px solid var(--line-2); position: relative;
}
.stage:last-child { border-right: none; }
.stage::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stage.s-done::after { background: var(--good); }
.stage.s-active::after { background: var(--brand-2); }
.stage.s-warn::after { background: var(--warn); }
.stage.s-fail::after { background: var(--bad); }
.stage.s-blank::after { background: var(--line-2); }
.stage.s-blank { background: var(--panel-muted); }
.stage-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 2px; }
.stage-ref { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--text); word-break: break-all; }
.stage-sub { font-size: 10px; color: var(--muted); }

.pill {
  display: inline-flex; align-items: center; gap: 5px; border-radius: 999px;
  padding: 3px 9px; font-size: 9px; font-weight: 800; border: 1px solid transparent; white-space: nowrap;
}
.pill.good { color: var(--good); background: var(--good-bg); border-color: var(--good-bdr); }
.pill.warn { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-bdr); }
.pill.bad { color: var(--bad); background: var(--bad-bg); border-color: var(--bad-bdr); }
.pill.blue { color: var(--brand-2); background: var(--neutral-bg); border-color: var(--neutral-bdr); }
.pill.purple { color: #6d28d9; background: rgba(124,58,237,.12); border-color: rgba(124,58,237,.24); }
.pill.grey { color: var(--muted); background: var(--panel-muted); border-color: var(--line-2); }

.prog-wrap { background: var(--line-2); border-radius: 6px; height: 6px; width: 100%; margin-top: 6px; overflow: hidden; }
.prog-bar { border-radius: 6px; height: 6px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.stage-acts { margin-top: auto; display: flex; gap: 5px; flex-wrap: wrap; padding-top: 6px; }
.slink {
  font-size: 10px; font-weight: 700; color: var(--brand-2); text-decoration: none;
  padding: 3px 9px; border-radius: 6px; border: 1px solid var(--neutral-bdr);
  background: var(--neutral-bg); white-space: nowrap;
}
.slink:hover { background: rgba(31,107,255,.12); color: var(--brand); }
.slink.new { color: var(--good); border-color: var(--good-bdr); background: var(--good-bg); }
.slink.new:hover { background: color-mix(in srgb, var(--good-bg) 72%, var(--good) 18%); }
.pipeline-arrow { display: flex; align-items: center; justify-content: center; background: var(--panel-muted); }
.pipeline-arrow svg { width: 18px; height: 18px; }
.arr-done { fill: #a7f3d0; }
.arr-active { fill: #bfdbfe; }
.arr-blank { fill: var(--line); }
.stage-err {
  font-size: 9px; color: var(--bad); background: var(--bad-bg);
  border: 1px solid var(--bad-bdr); border-radius: 6px; padding: 4px 8px; margin-top: 2px;
}
.flow-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.flow-empty-icon { font-size: 3rem; color: color-mix(in srgb, var(--muted) 45%, var(--line)); }
.flow-placeholder { color: color-mix(in srgb, var(--muted) 82%, transparent); font-style: italic; }
.flow-placeholder-soft { color: color-mix(in srgb, var(--muted) 94%, transparent); font-style: italic; }

@media (max-width: 1200px) {
  .info-grid { grid-template-columns: 1fr; }
  .decl-types { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .kpi-row { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (max-width: 760px) {
  .decl-types { grid-template-columns: 1fr; }
  .pipeline { grid-template-columns: 1fr; }
  .pipeline-arrow { display: none; }
  .kpi-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
}
</style>

{% include 'operations/flow_partial.html' %}
{% endblock %}
