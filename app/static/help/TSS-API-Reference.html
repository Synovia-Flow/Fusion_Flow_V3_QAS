<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSS Declaration API Reference v2.9.4</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --bg2: #111620;
    --bg3: #161c2a;
    --panel: #1a2235;
    --border: #2a3550;
    --accent: #3d7eff;
    --accent2: #00d4aa;
    --accent3: #ff6b35;
    --text: #c8d4f0;
    --text-dim: #6b7fa8;
    --text-bright: #eef2ff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --purple: #a855f7;
    --tag-get: #0d4a2e;
    --tag-get-text: #22c55e;
    --tag-post: #1a2d5a;
    --tag-post-text: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .app-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
  }
  .app-header .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-weight: 800; font-size: 11px;
    padding: 4px 10px; border-radius: 6px; letter-spacing: 0.5px;
  }
  .logo-title {
    font-size: 14px; font-weight: 700; color: var(--text-bright);
    letter-spacing: 0.3px;
  }
  .logo-version {
    font-size: 11px; color: var(--text-dim);
    background: var(--bg3); padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .header-meta {
    display: flex; gap: 20px; align-items: center; font-size: 12px; color: var(--text-dim);
  }
  .env-badge {
    padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .env-test { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
  .env-prod { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .env-badge.active { opacity: 1; }
  .env-badge:not(.active) { opacity: 0.5; }

  /* LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 290px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); }

  .sidebar-list {
    overflow-y: auto;
    flex: 1;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .nav-group-header {
    padding: 12px 14px 6px;
    font-size: 9px;
    font-weight: 800;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .nav-group-header:first-child { border-top: none; margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
  }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active { background: rgba(61,126,255,0.1); border-left: 2px solid var(--accent); }

  .nav-method {
    font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px; border-radius: 3px; min-width: 38px; text-align: center;
    flex-shrink: 0;
  }
  .m-post { background: var(--tag-post); color: var(--tag-post-text); }
  .m-get { background: var(--tag-get); color: var(--tag-get-text); }

  .nav-label {
    font-size: 12px; color: var(--text); line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-item.active .nav-label { color: var(--text-bright); }

  /* MAIN CONTENT */
  .main-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .content-area::-webkit-scrollbar { width: 6px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ENDPOINT CARD */
  .endpoint-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .endpoint-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .method-badge {
    font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    padding: 4px 12px; border-radius: 6px; flex-shrink: 0; margin-top: 2px;
  }
  .method-post { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
  .method-get { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }

  .endpoint-title { font-size: 18px; font-weight: 700; color: var(--text-bright); }
  .endpoint-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent2);
    margin-top: 6px;
    word-break: break-all;
  }
  .endpoint-desc { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.6; }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    background: var(--bg2);
  }
  .tab-btn {
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; padding: 24px; }
  .tab-panel.active { display: block; }

  /* CODE BLOCK */
  .code-block-wrap {
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .code-lang {
    font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
  }
  .copy-btn {
    font-size: 11px; font-weight: 600; color: var(--accent2);
    background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3);
    padding: 3px 10px; border-radius: 4px; cursor: pointer; font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(0,212,170,0.2); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); background: rgba(34,197,94,0.1); }

  pre {
    padding: 16px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    max-height: 400px;
    overflow-y: auto;
  }
  pre::-webkit-scrollbar { height: 4px; width: 4px; }
  pre::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .json-key { color: #60a5fa; }
  .json-str { color: #86efac; }
  .json-num { color: #f9a8d4; }
  .json-bool { color: #fde68a; }
  .json-null { color: var(--text-dim); }

  /* SCHEMA TABLE */
  .schema-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .schema-table th {
    background: var(--bg3);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .schema-table td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(42,53,80,0.5);
    vertical-align: top;
    line-height: 1.5;
  }
  .schema-table tr:hover td { background: rgba(255,255,255,0.02); }
  .schema-table tr:last-child td { border-bottom: none; }

  .field-name { font-family: 'JetBrains Mono', monospace; color: var(--accent2); font-size: 11px; }
  .field-type { font-family: 'JetBrains Mono', monospace; color: var(--purple); font-size: 11px; }

  .badge-req { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); font-size: 10px; padding: 1px 7px; border-radius: 3px; font-weight: 700; }
  .badge-opt { background: rgba(107,127,168,0.15); color: var(--text-dim); border: 1px solid var(--border); font-size: 10px; padding: 1px 7px; border-radius: 3px; }
  .badge-cond { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); font-size: 10px; padding: 1px 7px; border-radius: 3px; }
  .badge-na { background: rgba(107,127,168,0.1); color: var(--text-dim); border: 1px solid var(--border); font-size: 10px; padding: 1px 7px; border-radius: 3px; opacity: 0.5; }

  /* SQL styling */
  .sql-keyword { color: #7dd3fc; font-weight: 600; }
  .sql-string { color: #86efac; }
  .sql-comment { color: #4b5563; font-style: italic; }
  .sql-table { color: #fde68a; }
  .sql-field { color: var(--accent2); }

  /* Response section */
  .response-section { margin-top: 16px; }
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  /* Welcome screen */
  .welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; text-align: center; padding: 40px;
  }
  .welcome-icon { font-size: 48px; margin-bottom: 20px; }
  .welcome h2 { font-size: 24px; font-weight: 800; color: var(--text-bright); margin-bottom: 10px; }
  .welcome p { font-size: 13px; color: var(--text-dim); max-width: 400px; line-height: 1.7; }
  .welcome-stats {
    display: flex; gap: 24px; margin-top: 32px;
  }
  .stat-box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 24px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* Hidden */
  .hidden { display: none !important; }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Nested indicator */
  .nested-badge {
    font-size: 9px; background: rgba(168,85,247,0.15); color: var(--purple);
    border: 1px solid rgba(168,85,247,0.3); padding: 1px 6px; border-radius: 3px;
  }

  /* Search highlight */
  .nav-item.hidden-search { display: none; }

  /* URL params display */
  .url-params { margin-top: 10px; }
  .param-chip {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    margin: 2px;
  }
  .param-chip.required { border-color: rgba(239,68,68,0.3); color: #f87171; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="logo">
    <span class="logo-badge">TSS API</span>
    <span class="logo-title">Declaration API Reference</span>
    <span class="logo-version">v2.9.4 · Feb 2026</span>
  </div>
  <div class="header-meta">
    <span style="font-size:12px;color:var(--text-dim)">Environment:</span>
    <span class="env-badge env-test active" id="env-test" onclick="setEnv('test')">TEST</span>
    <span class="env-badge env-prod" id="env-prod" onclick="setEnv('prod')">PROD</span>
    <span style="font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;" id="env-url">api.tsstestenv.co.uk</span>
  </div>
</div>

<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search endpoints..." oninput="filterNav(this.value)" />
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div class="content-area" id="content-area">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">📡</div>
        <h2>TSS Declaration API Reference</h2>
        <p>Select any API endpoint from the sidebar to view its details, generate schema, and copy sample JSON payloads and SQL queries.</p>
        <div class="welcome-stats">
          <div class="stat-box"><div class="stat-num">50</div><div class="stat-label">Endpoints</div></div>
          <div class="stat-box"><div class="stat-num">12</div><div class="stat-label">Resources</div></div>
          <div class="stat-box"><div class="stat-num">2</div><div class="stat-label">Environments</div></div>
        </div>
      </div>
      <div id="endpoint-detail" class="hidden"></div>
    </div>
  </div>

</div>

<script>
// =============================================
// DATA
// =============================================
const BASE_URLS = {
  test: 'https://api.tsstestenv.co.uk',
  prod: 'https://api.tradersupportservice.co.uk'
};
let currentEnv = 'test';

function getBase() { return BASE_URLS[currentEnv]; }
function getPath(resource) {
  return `${getBase()}/api/x_fhmrc_tss_api/v1/tss_api/${resource}`;
}

const endpoints = [
  // ── DECLARATION HEADER ──────────────────────────────────────────────────
  {
    id: 'hdr-create',
    group: 'Declaration Header',
    label: 'Create / Update',
    method: 'POST',
    resource: 'headers',
    title: 'Declaration Header – Create / Update',
    desc: 'Creates a new or updates an existing ENS Declaration Header. op_type must be "create" or "update". For updates, all required fields must be resent.',
    fields: [
      { name:'op_type',          type:'String',    req:'Required', note:'Value: "create" or "update"' },
      { name:'declaration_number',type:'String(40)', req:'Conditional', note:'No for create; Yes for update' },
      { name:'movement_type',    type:'String(40)', req:'Required', note:'Choice field — see Section 13' },
      { name:'type_of_passive_transport', type:'String(40)', req:'Conditional', note:'Required if movement_type is "RoRo Accompanied" (3a)' },
      { name:'identity_no_of_transport', type:'String(27)', req:'Required', note:'IMO+7digits for Maritime; IMO+7digits#4-16alpha for RoRo' },
      { name:'nationality_of_transport', type:'Alpha(2)', req:'Required', note:'Choice field' },
      { name:'conveyance_ref',   type:'String(35)', req:'Conditional', note:'Required if movement_type is "Air"; max 8 chars for Air' },
      { name:'arrival_date_time',type:'DateTime',  req:'Required', note:'dd/mm/yyyy hh:mm:ss UTC; not in past; max 14 days future' },
      { name:'arrival_port',     type:'String(200)',req:'Required', note:'Choice field' },
      { name:'place_of_loading', type:'String(33)', req:'Required', note:'Regex validation for Maritime/RoRo' },
      { name:'place_of_unloading',type:'String(33)',req:'Required', note:'Regex validation for Maritime/RoRo' },
      { name:'place_of_acceptance_same_as_loading', type:'yes/no', req:'Conditional', note:'Required if RoRo Accompanied' },
      { name:'place_of_acceptance',type:'String(33)',req:'Conditional', note:'Required if RoRo Accompanied and not same as loading' },
      { name:'place_of_delivery_same_as_unloading',type:'yes/no',req:'Conditional', note:'Required if RoRo Accompanied' },
      { name:'place_of_delivery', type:'String(33)',req:'Conditional', note:'Required if RoRo Accompanied and not same as unloading' },
      { name:'seal_number',      type:'String(20)', req:'Optional', note:'Identification of seals on transport' },
      { name:'route',            type:'String(20)', req:'Optional', note:'Read-only; auto-set from arrival_port' },
      { name:'transport_charges',type:'String(40)', req:'Required', note:'Choice field' },
      { name:'carrier_eori',     type:'String(200)',req:'Required', note:'Use XI EORI, not GB' },
      { name:'carrier_name',     type:'String(35)', req:'Conditional', note:'Required if Maritime/RoRo Unaccompanied/RoRo Accompanied' },
      { name:'carrier_street_number',type:'String(35)',req:'Conditional', note:'Required for Maritime/RoRo movement types' },
      { name:'carrier_city',     type:'String(35)', req:'Conditional', note:'Required for Maritime/RoRo movement types' },
      { name:'carrier_postcode', type:'String(9)',  req:'Conditional', note:'Required for Maritime/RoRo movement types' },
      { name:'carrier_country',  type:'Alpha(2)',   req:'Conditional', note:'Choice field; required for Maritime/RoRo' },
      { name:'haulier_eori',     type:'String(200)',req:'Optional', note:'Haulier EORI if different from carrier' },
    ],
    sample: `{
  "op_type": "create",
  "declaration_number": "",
  "movement_type": "1a",
  "identity_no_of_transport": "IMO1234567#A1234567",
  "nationality_of_transport": "GB",
  "conveyance_ref": "",
  "arrival_date_time": "25/06/2025 11:00:00",
  "arrival_port": "GBAUBELBELBEL",
  "place_of_loading": "Birkenhead",
  "place_of_acceptance_same_as_loading": "yes",
  "place_of_acceptance": "",
  "place_of_unloading": "Belfast",
  "place_of_delivery_same_as_unloading": "yes",
  "place_of_delivery": "",
  "seal_number": "s123456",
  "route": "gb-ni",
  "transport_charges": "Y",
  "carrier_eori": "XI000012340005",
  "carrier_name": "Goods By Goods",
  "carrier_street_number": "10",
  "carrier_city": "London",
  "carrier_postcode": "N1 8LN",
  "carrier_country": "gb",
  "haulier_eori": ""
}`,
    response: `{
  "result": {
    "status": "created",
    "process_message": "SUCCESS",
    "reference": "ENS000000000001152"
  }
}`,
    sqlTable: 'declaration_header',
    sqlFields: ['declaration_number','movement_type','identity_no_of_transport','nationality_of_transport','arrival_date_time','arrival_port','place_of_loading','place_of_unloading','carrier_eori','transport_charges'],
  },
  {
    id: 'hdr-cancel',
    group: 'Declaration Header',
    label: 'Cancel',
    method: 'POST',
    resource: 'headers',
    title: 'Declaration Header – Cancel',
    desc: 'Cancels an existing Declaration Header. op_type must be "cancel". Can only be performed under certain conditions.',
    fields: [
      { name:'op_type',           type:'String',    req:'Required', note:'Value must be "cancel"' },
      { name:'declaration_number',type:'String(40)', req:'Required', note:'Reference number of the Declaration Header' },
    ],
    sample: `{
  "op_type": "cancel",
  "declaration_number": "ENS000000000001152"
}`,
    response: `{
  "result": {
    "status": "cancelled",
    "process_message": "SUCCESS",
    "reference": "ENS000000000001152"
  }
}`,
    sqlTable: 'declaration_header',
    sqlFields: ['declaration_number','status'],
  },
  {
    id: 'hdr-read',
    group: 'Declaration Header',
    label: 'Read',
    method: 'GET',
    resource: 'headers',
    title: 'Declaration Header – Read',
    desc: 'Reads an existing Declaration Header. Requires reference and at least one field name. Additional fields: status, error_message.',
    params: [
      { name:'reference', req:true, note:'Reference number of the declaration header' },
      { name:'fields',    req:true, note:'Comma-separated list of field names to return' },
      { name:'actAs',     req:false, note:'customer_account_sys_id for agent acting on behalf of customer' },
    ],
    fields: [
      { name:'status',       type:'String', req:'Optional', note:'Draft | Submitted | Processing | Trader Input Required | Authorised for Movement | Arrived | Cancelled' },
      { name:'error_message',type:'String', req:'Optional', note:'Details if related Consignments require attention' },
      { name:'(all create fields)', type:'–', req:'Optional', note:'Any field from the create payload' },
    ],
    sample: `GET ${getPath('headers')}?reference=ENS000000000001152&fields=status,arrival_port,seal_number,route,carrier_eori`,
    response: `{
  "result": {
    "reference": "ENS000000000001152",
    "status": "cancelled",
    "arrival_port": "GBAUBELBELBEL",
    "seal_number": "s123456",
    "route": "gb-ni",
    "carrier_eori": "XI123456789012"
  }
}`,

// =============================================
// ENV SWITCHING
// =============================================
function setEnv(env) {
  currentEnv = env;
  document.getElementById('env-test').classList.toggle('active', env === 'test');
  document.getElementById('env-prod').classList.toggle('active', env === 'prod');
  document.getElementById('env-url').textContent = env === 'test' ? 'api.tsstestenv.co.uk' : 'api.tradersupportservice.co.uk';
  // Refresh current endpoint if GET
  if (currentEndpointId) {
    const ep = endpoints.find(e => e.id === currentEndpointId);
    if (ep && ep.isGet) showEndpoint(ep.id);
  }
}

// =============================================
// BUILD SIDEBAR
// =============================================
function buildSidebar() {
  const container = document.getElementById('sidebar-list');
  const groups = [...new Set(endpoints.map(e => e.group))];
  groups.forEach(g => {
    const header = document.createElement('div');
    header.className = 'nav-group-header';
    header.textContent = g;
    container.appendChild(header);
    endpoints.filter(e => e.group === g).forEach(ep => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-' + ep.id;
      item.dataset.id = ep.id;
      item.dataset.label = ep.label.toLowerCase();
      item.dataset.group = ep.group.toLowerCase();
      item.innerHTML = `<span class="nav-method m-${ep.method.toLowerCase()}">${ep.method}</span><span class="nav-label">${ep.label}</span>`;
      item.addEventListener('click', () => showEndpoint(ep.id));
      container.appendChild(item);
    });
  });
}

// =============================================
// FILTER
// =============================================
function filterNav(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el => {
    const match = !q || el.dataset.label.includes(q) || el.dataset.group.includes(q);
    el.classList.toggle('hidden', !match);
  });
  document.querySelectorAll('.nav-group-header').forEach(h => {
    const sibs = [];
    let n = h.nextElementSibling;
    while (n && !n.classList.contains('nav-group-header')) {
      sibs.push(n);
      n = n.nextElementSibling;
    }
    const anyVisible = sibs.some(s => !s.classList.contains('hidden'));
    h.classList.toggle('hidden', !anyVisible);
  });
}

// =============================================
// SYNTAX HIGHLIGHTING
// =============================================
function highlightJSON(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"((?:[^"\\]|\\.)*)"\s*:/g, '<span class="json-key">"$1"</span>:')
    .replace(/:\s*"((?:[^"\\]|\\.)*)"/g, ': <span class="json-str">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
    .replace(/:\s*(true|false)/g, ': <span class="json-bool">$1</span>')
    .replace(/:\s*(null)/g, ': <span class="json-null">$1</span>');
}

function highlightSQL(sql) {
  const kws = ['SELECT','INSERT','INTO','VALUES','UPDATE','SET','DELETE','FROM','WHERE','AND','OR','NOT','IN','IS','NULL','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','INDEX','ON','PRIMARY','KEY','DEFAULT','VARCHAR','INT','NUMERIC','DATE','TIMESTAMP','JOIN','LEFT','INNER','ORDER','BY','GROUP','HAVING','LIMIT','OFFSET','AS','DISTINCT'];
  let out = sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  kws.forEach(kw => {
    out = out.replace(new RegExp('\\b' + kw + '\\b', 'g'), `<span class="sql-keyword">${kw}</span>`);
  });
  out = out.replace(/'([^']*)'/g, "<span class='sql-string'>'$1'</span>");
  out = out.replace(/--[^\n]*/g, m => `<span class='sql-comment'>${m}</span>`);
  return out;
}

// =============================================
// GENERATE SQL
// =============================================
function generateSQL(ep) {
  const table = ep.sqlTable;
  const fields = ep.sqlFields;
  let sql = '';

  if (ep.isGet) {
    sql = `-- SELECT query for ${ep.title}\nSELECT\n  ${fields.join(',\n  ')}\nFROM ${table}\nWHERE 1=1\n  -- Add your filter conditions here\n  -- AND status = 'Draft'\nORDER BY sys_created_on DESC\nLIMIT 100;`;
  } else if (ep.method === 'POST') {
    const firstField = fields[0] || 'id';
    const isCreate = (ep.sample || '').includes('"create"');
    const isDelete = (ep.sample || '').includes('"delete"') || ep.label.includes('Delete');
    const isCancel = (ep.sample || '').includes('"cancel"') || ep.label.includes('Cancel');

    if (isDelete) {
      sql = `-- DELETE record from ${table}\nDELETE FROM ${table}\nWHERE ${firstField} = '<reference>';\n\n-- Audit log insert\nINSERT INTO ${table}_audit_log (table_name, operation, record_id, timestamp)\nVALUES ('${table}', 'DELETE', '<reference>', CURRENT_TIMESTAMP);`;
    } else if (isCancel || (ep.sample||'').includes('"cancel"')) {
      sql = `-- UPDATE status to cancelled in ${table}\nUPDATE ${table}\nSET status = 'cancelled',\n    sys_updated_on = CURRENT_TIMESTAMP\nWHERE ${firstField} = '<reference>';\n\n-- Verify update\nSELECT ${firstField}, status FROM ${table}\nWHERE ${firstField} = '<reference>';`;
    } else if (isCreate) {
      const vals = fields.map(f => `'<${f}>'`).join(',\n  ');
      sql = `-- INSERT into ${table}\nINSERT INTO ${table} (\n  ${fields.join(',\n  ')}\n) VALUES (\n  ${vals}\n);\n\n-- Retrieve created record\nSELECT ${firstField}, status, sys_created_on\nFROM ${table}\nORDER BY sys_created_on DESC LIMIT 1;`;
    } else {
      // update/submit
      const setClause = fields.slice(1).map(f => `    ${f} = '<${f}>'`).join(',\n');
      sql = `-- UPDATE ${table}\nUPDATE ${table}\nSET\n${setClause},\n    sys_updated_on = CURRENT_TIMESTAMP\nWHERE ${firstField} = '<reference>';\n\n-- Check the result\nSELECT ${fields.join(', ')}\nFROM ${table}\nWHERE ${firstField} = '<reference>';`;
    }
  }
  return sql;
}

    <div class="endpoint-card">
      <div class="endpoint-header">
        <span class="method-badge ${methodClass}">${ep.method}</span>
        <div>
          <div class="endpoint-title">${ep.title}</div>
          <div class="endpoint-url">${urlPath}</div>
          ${paramsHtml}
          <div class="endpoint-desc">${ep.desc}</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${currentTab==='payload'?'active':''}" onclick="switchTab('payload')">📦 Payload</button>
        <button class="tab-btn ${currentTab==='schema'?'active':''}" onclick="switchTab('schema')">🔍 Schema</button>
        <button class="tab-btn ${currentTab==='sql'?'active':''}" onclick="switchTab('sql')">🗄️ SQL</button>
        <button class="tab-btn ${currentTab==='response'?'active':''}" onclick="switchTab('response')">✅ Response</button>
      </div>

      <!-- PAYLOAD TAB -->
      <div class="tab-panel ${currentTab==='payload'?'active':''}" id="tab-payload">
        <div class="section-label">Sample Request</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">${ep.isGet ? 'HTTP GET' : 'JSON'}</span>
            <button class="copy-btn" onclick="copyCode('sample-code-${id}', this)">Copy</button>
          </div>
          <pre id="sample-code-${id}">${sampleDisplay ? highlightJSON(sampleDisplay) : '<span style="color:var(--text-dim)">No sample available</span>'}</pre>
        </div>

        ${ep.params && ep.params.length > 0 ? `
        <div class="section-label" style="margin-top:20px">Query Parameters</div>
        <div class="code-block-wrap">
          <table class="schema-table">
            <thead><tr><th>Parameter</th><th>Type</th><th>Required</th><th>Description</th></tr></thead>
            <tbody>${paramTableRows}</tbody>
          </table>
        </div>` : ''}
      </div>

      <!-- SCHEMA TAB -->
      <div class="tab-panel ${currentTab==='schema'?'active':''}" id="tab-schema">
        ${ep.fields && ep.fields.length > 0 ? `
        <div class="section-label">Field Schema</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">Schema</span>
            <button class="copy-btn" onclick="copySchemaJSON('${id}', this)">Copy as JSON Schema</button>
          </div>
          <table class="schema-table">
            <thead><tr><th>Field Name</th><th>Type</th><th>Mandatory</th><th>Description</th></tr></thead>
            <tbody>${schemaRows}</tbody>
          </table>
        </div>` : `<div style="color:var(--text-dim);text-align:center;padding:40px">No schema fields defined for this endpoint.</div>`}

        ${ep.fields && ep.fields.length > 0 ? `
        <div class="section-label" style="margin-top:20px">Generated JSON Schema</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">JSON Schema</span>
            <button class="copy-btn" onclick="copyCode('schema-json-${id}', this)">Copy</button>
          </div>
          <pre id="schema-json-${id}">${highlightJSON(buildJSONSchema(ep))}</pre>
        </div>` : ''}
      </div>

      <!-- SQL TAB -->
      <div class="tab-panel ${currentTab==='sql'?'active':''}" id="tab-sql">
        <div class="section-label">Generated SQL</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">SQL</span>
            <button class="copy-btn" onclick="copyCode('sql-code-${id}', this)">Copy</button>
          </div>
          <pre id="sql-code-${id}">${highlightSQL(sqlCode)}</pre>
        </div>

        <div class="section-label" style="margin-top:20px">Table: ${ep.sqlTable}</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">SQL DDL</span>
            <button class="copy-btn" onclick="copyCode('ddl-code-${id}', this)">Copy</button>
          </div>
          <pre id="ddl-code-${id}">${highlightSQL(buildDDL(ep))}</pre>
        </div>
      </div>

      <!-- RESPONSE TAB -->
      <div class="tab-panel ${currentTab==='response'?'active':''}" id="tab-response">
        <div class="section-label">Example Response</div>
        <div class="code-block-wrap">
          <div class="code-block-header">
            <span class="code-lang">JSON</span>
            <button class="copy-btn" onclick="copyCode('response-code-${id}', this)">Copy</button>
          </div>
          <pre id="response-code-${id}">${ep.response ? highlightJSON(ep.response) : '<span style="color:var(--text-dim)">No response example</span>'}</pre>
        </div>

        <div class="response-section">
          <div class="section-label">Response Fields</div>
          <div class="code-block-wrap">
            <table class="schema-table">
              <thead><tr><th>Field</th><th>Type</th><th>Description</th></tr></thead>
              <tbody>
                <tr><td><span class="field-name">status</span></td><td><span class="field-type">String</span></td><td style="color:var(--text-dim);font-size:12px">created | updated | cancelled | deleted | submitted | reclassified</td></tr>
                <tr><td><span class="field-name">process_message</span></td><td><span class="field-type">String</span></td><td style="color:var(--text-dim);font-size:12px">SUCCESS or error detail</td></tr>
                <tr><td><span class="field-name">reference</span></td><td><span class="field-type">String</span></td><td style="color:var(--text-dim);font-size:12px">Reference number of the created/updated record</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="response-section">
          <div class="section-label">Error Response Format</div>
          <div class="code-block-wrap">
            <div class="code-block-header">
              <span class="code-lang">JSON</span>
              <button class="copy-btn" onclick="copyCode('err-code-${id}', this)">Copy</button>
            </div>
            <pre id="err-code-${id}">${highlightJSON(`{
  "result": {
    "status": "error",
    "process_message": "Validation error: arrival_date_time cannot be in the past",
    "reference": ""
  }
}`)}</pre>
          </div>
        </div>
      </div>
    </div>
  `;
}

// =============================================
// BUILD JSON SCHEMA
// =============================================
function buildJSONSchema(ep) {
  const props = {};
  const required = [];
  (ep.fields || []).forEach(f => {
    if (f.name.startsWith('(')) return;
    const isNested = f.type && (f.type.includes('Nested') || f.type.includes('[]'));
    let jsonType = 'string';
    if (f.type && f.type.toLowerCase().includes('numeric')) jsonType = 'number';
    if (f.type && (f.type.toLowerCase().includes('yes/no') || f.type.toLowerCase().includes('boolean'))) jsonType = 'string';
    if (isNested) jsonType = 'array';

    props[f.name] = { type: jsonType };
    if (f.note) props[f.name].description = f.note;
    if (f.req === 'Required') required.push(f.name);
  });

  const schema = {
    "$schema": "http://json-schema.org/draft-07/schema#",
    "title": ep.title,
    "type": "object",
    "properties": props
  };
  if (required.length) schema.required = required;
  return JSON.stringify(schema, null, 2);
}

// =============================================
// BUILD DDL
// =============================================
function buildDDL(ep) {
  const cols = ep.sqlFields.map(f => {
    let type = 'VARCHAR(200)';
    if (f.includes('date') || f.includes('time')) type = 'TIMESTAMP';
    if (f.includes('amount') || f.includes('mass') || f.includes('weight') || f.includes('count')) type = 'NUMERIC(15,2)';
    return `  ${f} ${type}`;
  }).join(',\n');

  return `CREATE TABLE IF NOT EXISTS ${ep.sqlTable} (\n  id VARCHAR(40) PRIMARY KEY,\n${cols},\n  status VARCHAR(50),\n  sys_created_on TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n  sys_updated_on TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n);\n\nCREATE INDEX idx_${ep.sqlTable}_status ON ${ep.sqlTable}(status);\nCREATE INDEX idx_${ep.sqlTable}_created ON ${ep.sqlTable}(sys_created_on);`;
}

// =============================================
// TAB SWITCHING
// =============================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + tab);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(tab) || b.getAttribute('onclick')?.includes(tab)) b.classList.add('active');
  });
}

// =============================================
// COPY HELPERS
// =============================================
function copyCode(elId, btn) {
  const el = document.getElementById(elId);
  if (!el) return;
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copySchemaJSON(id, btn) {
  const ep = endpoints.find(e => e.id === id);
  if (!ep) return;
  const text = buildJSONSchema(ep);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy as JSON Schema'; btn.classList.remove('copied'); }, 2000);
  });
}

// =============================================
// INIT
// =============================================
buildSidebar();
</script>
</body>
</html>
