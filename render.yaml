services:
  # Backend: FastAPI
  - type: web
    name: fusion-api
    runtime: python
    rootDir: Integration_Layer/Portal/fusion_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Set these in the Render dashboard. Never commit real values.
      - key: DB_CONN_STR
        sync: false
      - key: FLOW_V1_USER
        sync: false
      - key: FLOW_V1_PASSWORD
        sync: false
      # Replace with the actual static-site URL after first deploy.
      - key: FUSION_PORTAL_CORS_ORIGINS
        value: https://fusion-portal.onrender.com

  # Frontend: React / Vite static site
  - type: web
    name: fusion-portal
    runtime: static
    rootDir: Integration_Layer/Portal/fusion_portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Replace with the actual API URL after first deploy.
      - key: VITE_API_BASE_URL
        value: https://fusion-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
