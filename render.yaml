# Active deployment target while Azure subscription is not available.
# Azure can be re-enabled later with a GitHub Actions workflow.
services:
  - type: web
    name: fusion-flow-api
    runtime: docker
    dockerfilePath: Integration_Layer/Portal/fusion_api/Dockerfile
    dockerContext: Integration_Layer/Portal/fusion_api
    healthCheckPath: /api/health
    envVars:
      - key: DB_CONN_STR
        sync: false
      - key: FLOW_V1_USER
        sync: false
      - key: FLOW_V1_PASSWORD
        sync: false
      - key: FUSION_PORTAL_CORS_ORIGINS
        value: https://fusion-flow-portal.onrender.com

  - type: web
    name: fusion-flow-portal
    runtime: static
    rootDir: Integration_Layer/Portal/fusion_portal
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fusion-flow-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html